        '200':
          description: List of status change events for the task.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/History'
                  meta:
                    type: object
                    properties:
                      page: 
                        type: integer
                      totalPages:
                        type: integer
                      totalHistory:
                        type: integer
              example:
                data:
                  - changedAt: "2025-03-30T09:00:00Z"
                    oldStatus: "pending"
                    newStatus: "in_progress"
                  - changedAt: "2025-04-01T17:15:00Z"
                    oldStatus: "in_progress"
