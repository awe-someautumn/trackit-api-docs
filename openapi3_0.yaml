  /analytics/overview:
    get:
      tags:
        - Analytics
      summary: Get overview analytics for the user
      description: |
        Retrieve an overview of key productivity metrics for the authenticated user, such as task counts and completion rate.
      responses:
        '200':
          description: Overview analytics successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalProjects:
                    type: integer
                    example: 5
                    description: Total number of projects owned or joined by the user.
                  totalTasks:
                    type: integer
                    example: 45
                    description: Total number of tasks across all projects.
                  completedTasks:
                    type: integer
                    example: 38
                    description: Number of tasks marked as completed.
                  pendingTasks:
                    type: integer
                    example: 5
                    description: Number of tasks currently pending.
                  overdueTasks:
                    type: integer
                    example: 2
                    description: Number of tasks past their due date.
                  completionRate:
                    type: number
                    format: float
                    example: 0.84
                    description: Ratio of completed tasks to total tasks.
              example:
                totalProjects: 5
                totalTasks: 45
                completedTasks: 38
                pendingTasks: 5
                overdueTasks: 2
                completionRate: 0.84

  /assistant/ask:
    post:
      tags:
        - Assistant
      summary: Ask a question about using trackit
      description: |
        Send a question to the Trackit assistant powered by ChatGPT to receive guidance. Accepts natural language queries such as "How do I assign a task?" or "Show me overdue tasks.".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  description: A natural language question about how to use Trackit features.
              required:
                - question
            example:
              question: "How do I assign a task to a team member?"
      responses:
        '200':
          description: ChatGPT-powered assistant response.
          content: 
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      answer:
                        type: string
                        description: The assistant's generated response.
              example:
                data:
                  answer: "To assign a task to a team member, go to the task detail view and use the assignee dropdown menu to select a user."
        '400':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    oAuth2AuthCode:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/oauth/authorize
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            profile: Access to user profile
            tasks: Access to task resource
            projects: Access to project resources
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            read: Read only access to tasks
            write: Read Write access to tasks
            projects: Access to project data
            admin: Admin-level permissions
          

  schemas:
    Registration:
      type: object
      description: Schema for registering a new user.
      properties:
        email:
          type: string
          description: Email address of the user.
          example: "summer.lee@example.com"
        password:
          type: string
          description: Password for the user account.
          example: "passwordforsummer123"
        fullName:
          type: string
          description: Full name of the user.
          example: "Summer Lee"
    
    User:
      type: object
      description: Represents a user of the Trackit system.
      properties:
        userId: 
          type: string
          description: Unique identifier for the user.
          example: "user_001"
        username:
          type: string
          description: Public-facing username.
          example: "winter"
        fullName:
          type: string
          description: Full name of the user.
          example: "Winter Doe"
        email:
          type: string
          description: Email address of the user.
          example: "winter.doe@example.com"
    
    Project:
      type: object
      description: Represents a project that contains tasks.
      properties:
        projectId:
          type: string
          description: Unique identifier of the project.
          example: "proj_001"
        title:
          type: string
          description: Title of the project.
          example: "Trackit Redesign"
        description:
          type: string
          description: Detailed description of the project.
          example: "UI/UX overhaul of the Trackit platform."
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the project was created.
          example: "2025-03-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the project was last updated.
          example: "2025-03-03T15:30:00Z"

    Task:
      type: object
      description: A task assigned to a user within a project.
      properties:
        taskId:
          type: string
          description: Unique identifier for the task.
          example: "task_001"
        title:
          type: string
          description: Title of the task.
          example: "Design homepage"
        description: 
          type: string
          description: Detailed description of the task.
          example: "Create layout wireframes for the homepage"
        status:
          type: string
          enum: [pending, in_progress, completed]
          description: Current status of the task.
          example: "in_progress"
        assignee:
          $ref: '#/components/schemas/User'
        dueDate:
          type: string
          format: date
          description: Due date of the task.
          example: "2025-04-10"
    
    PaginationMeta:
      type: object
      description: Pagination metadata for paginated responses.
      properties:
        totalItems:
          type: integer
          description: Total number of items available
          example: 48
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Number of items per page
        totalPages:
          type: integer
          description: Total number of available pages
          example: 5

    Comment:
        type: object
        description: Schema representing a comment on a task, optionally with a mention.
        properties:
          commentId:
            type: string
            description: Unique identifier for the comment.
            example: "cmt_001"
          taskId:
            type: string
            description: The ID of the task to comment on.
            example: "task_001"
          author:
            $ref: '#/components/schemas/User'
          content:
            type: string
            description: The content of the comment.
            example: "@john please review the UI update."
          createdAt:
            type: string
            format: date-time
            description: Timestamp of when the comment was created.
            example: "2025-04-02T09:20:00Z"

    Notification:
      type: object
      description: Notification returned to user based on type.
      discriminator:
        propertyName: type
      required:
        - notificationId
        - type
        - message
        - isRead
        - createdAt
      properties:
        notificationId:
          type: string
        type: 
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MentionNotification:
      description: A notification mentioning other user using @syntax.
      allOf:
        - $ref: '#/components/schemas/Notification'
        - type: object
          properties:
            mentionedUser:
              $ref: '#/components/schemas/User'

    DueSoonNotification:
      allOf:
        - $ref: '#/components/schemas/Notification'
        - type: object
          properties:
            dueDate:
              type: string
              format: date
    
    CommentNotification:
      allOf:
        - $ref: '#/components/schemas/Notification'
        - type: object
          properties:
            commentId:
              type: string
    
    StatusUpdateNotification:
      allOf:
        - $ref: '#/components/schemas/Notification'
        - type: object
          properties:
            oldStatus:
              type: string
            newStatus:
              type: string
    
    History:
      type: object
      description: Represents a task status change history record.
      properties:
        taskId:
          type: string
          description: ID of the task that was updated.
          example: "task_001"
        userId:
          type: string
          example: "user_001"
        projectId:
          type: string
          example: "proj_001"
        changedAt:
          type: string
          format: date-time
          description: Time when the status change occurred.
          example: "2025-04-01T17:15:00Z"
        oldStatus:
          type: string
          description: Previous status before the update.
          example: "in_progress"
        newStatus:
          type: string
          description: Updated status after the change.
          example: "completed"

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string

    ErrorResponse: #재사용 가능한 에러 객체 구조(template)
      type: object
      properties:
        status:
          type: integer
          example: 401 #임의로 선정
        message:
          type: string
          example: "Authentication token is missing or invalid."

  responses:
    ValidationError:
      description: The request input is invalid or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: 400
              message: "Missing required field 'title'"

    UnauthorizedError:
      description: Unauthorized - JWT token missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 401
            message: "Authentication token is missing or invalid."
    
    ForbiddenError:
      description: Forbidden - You do not have access to this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 403
            message: "You are not authorized to acess this resource."

    NotFoundError:
      description: The specified resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: 404
              message: "Resource not found"
          










