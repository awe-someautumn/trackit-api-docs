openapi: 3.0.3
info:
  title: Trackit API Documentation
  description: |
    This is the official API documentation for **Trackit**, a collaborative project and task management tool.
    
    🚀 Core Features:
    - Create and manage tasks within projects
    - Real-time collaboration through comments and mentions
    - Track task history and progress updates
    - Use the integrated ChatGPT assistant for help

    🔒 Security:
    - Supports Bearer Token, API Key, and OAuth 2.0 flows
    
    📌 Special Behaviors:
    - Use `@mention` in comment content to trigger notifications
    - Query the `/assistant/ask` endpoint for help using ChatGPT 

  termsOfService: https://example.com/terms/
  version: 1.0.0
  contact: 
    name: Trackit API Support
    email: api-support@trackitapp.com
    url: https://example.com/support/
  license:
    name: MIT license
    url: https://opensource.org/license/MIT
  x-initialOAuth:
    usePkcewithAuthorizationCodeGrant: true
    clientId: trackit-client-id
  x-errorGlossary:
    description: Common error responses across the Trackit API.
    errors:
      - code: 400
        message: Bad Request - Your request is invalid or malformed.
      - code: 401
        message: Unauthorized - Authentication token is missing or invalid.
      - code: 403
        message: Forbidden - You are not authorized to access this resource.
      - code: 404
        message: Not Found - The requested resource does not exist.
      - code: 500
        message: Internal Server Error - Something went wrong on our end.

servers:
  - url: https://localhost/:8080
  - url: https://example.com/v1
    description: Production Server
  - url: https://example.com/sandbox
    description: Sandbox Server
  - url: https://6555ad9d-d24f-4107-b46f-e2343c0d65b7.mock.pstmn.io
    description: Postman Mock Server for Trackit API specification

tags:
  - name: Authentication
    description: User registration and login
  - name: Users
    description: Registered user
  - name: Projects
    description: Project-level operations
  - name: Tasks
    description: Create and manage individual tasks
  - name: Comments
    description: Comment threads with @mentions
  - name: Notifications
    description: In-app or email-based alerts
  - name: History
    description: Task status change logs
  - name: Analytics
    description: Overview and insights of user and project activity
  - name: Assistant
    description: ChatGPT-powered assistant for Trackit-related help

security:
  - BearerAuth: []
  - ApiKeyAuth: []
  - oAuth2AuthCode: []
  - oAuth2ClientCredentials: []

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Submit user information to create a new Trackit account.
      requestBody: 
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration:
                  $ref: "#/components/schemas/Registration"
              required:
                - email
                - password
                - fullName
            example:
              email: "summer.lee@example.com"
              password: "passwordforsummer123"
              fullName: "Summer Lee"
      responses:
        '201':
          description: User registered successfully with provided credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fullName: 
                    type: string
              example:
                fullName: "Summer Lee"
        '400':
          $ref: "#/components/responses/ValidationError"
  
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login to receive a JWT token
      description: Authenticate an existing user and return a JWT access token for subsequent requests.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email address used for login.
                password:
                  type: string
                  description: User account password.
              required:
                - email
                - password
            example:
              email: "summer.lee@tracking.com"
              password: "passwordforsummer123"
      responses:
        '200':
          description: User successfully authenticated and token returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authenticated requests.
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  
  /auth/callback:
    get:
      tags:
        - Authentication
      summary: OAuth2 Callback Redirect URI
      description: The redirect URI where Trackit receives the authorization code after user login.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Authorization code returned by the OAuth provider.
        - in: query
          name: state
          required: false
          schema: 
            type: string
          description: Optional state parameter for CSRF protection
      responses:
        '200':
          description: OAuth callback successfully processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OAuth callback successfully handled."
        '400':
          description: Invalid request or missing authorization code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                message: "Missing or invalid authorization code."

  /users/me:
    get:
      tags:
        - Users
      summary: Get current authenticated user.
      description: Retrieve information about the currently authenticated user.
      security:
        - oAuth2AuthCode:
            - profile
      responses:
        '200':
          description: User profile successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
              example:
                data:
                  userId: "user_001"
                  fullName: "Winter Doe"
                  email: "winter.doe@example.com"
                  username: "winter"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
          

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      description: Retrieve user details for a given user ID.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            example: "user_001"
          description: The unique identifier of the user.
      responses:
        '200':
          description: User data successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: 
                    $ref: '#/components/schemas/User'
              example:
                data:
                  userId: "user_003"
                  username: "summer"
                  fullName: "Summer Mi"
                  email: "summer.mi@example.com"

  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      description: Retrieve a list of all accessible projects for the authenticated user.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number of the result set.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of projects per page.
      responses:
        '200':
          description: A list of projects successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  meta:
                    type: object
                    properties:
                      page: 
                        type: integer
                      totalPages:
                        type: integer
                      totalProjects:
                        type: integer
              example:
                data:
                  - projectId: "proj_001"
                    title: "Trackit Redesign"
                    description: "UI/UX overhaul of the Trackit platform."
                    createdAt: "2025-03-01T10:00:00Z"
                    updatedAt: "2025-03-03T15:30:00Z"
                  - projectId: "proj_002"
                    title: "Marketing Dashboard"
                    description: "A new dashboard for visualizing marketing KPIs."
                    createdAt: "2025-03-10T09:15:00Z"
                    updatedAt: "2025-03-11T11:20:00Z"
                meta:
                  page: 1
                  totalPages: 2
                  totalProjects: 12
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags:
        - Projects
      summary: Create a new project
      description: Submit project title and description to create a new project.
      requestBody: 
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the project.
                description:
                  type: string
                  description: A short explanation of the project's purpose or goals.
              required:
                - title
            example:
              title: "Website Redesign"
              description: "A complete overhaul of the corporate website, including branding and UX."
      responses:
        '201':
          description: Project successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
              example:
                data:
                  projectId: "proj_003"
                  title: "Website Redesign"
                  description: "A complete overhaul of the corporate website, including branding and UX."
                  createdAt: "2025-04-08T09:00:00Z"
                  updatedAt: "2025-04-08T09:00:00Z"
        '400':
          $ref: '#/components/responses/ValidationError'
  
  /projects/{projectId}:
    get:
      tags:
        - Projects
      summary: Get a specific project ID
      description: Retrieve the details of a project by providing its unique ID.
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            example: "proj_123"
          description: Unique identifier of the project.
      responses:
        '200':
          description: Project details successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
              example:
                data:
                  projectId: "proj_112"
                  title: "Website Redesign"
                  description: "Redesign the marketing site with new branding."
                  owner: 
                    userId: "user_001"
                    username: "winter"
                  createdAt: "2025-03-15T09:00:00Z"
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/responses/NotFoundError'
              example:
                status: 404
                message: "Project not found."
    put:
      tags:
        - Projects
      summary: Update a specific project
      description: Modify an existing project's title or description by providing its ID.
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            example: proj_003
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
            example:
              title: "Website Revamp"
              description: "Update layout and content for the new campaign."
      responses:
        '200': 
          description: Project successfully updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
              example:
                data:
                  projectId: "proj_003"
                  title: "Website Revamp"
                  description: "Update layout and content for the new campaign."
                  createdAt: "2025-04-08T09:00:00Z"
                  updatedAt: "2025-04-09T10:15:00Z"
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/responses/NotFoundError'
              example:
                status: 404
                message: "Project not found."
    delete: 
      tags:
        - Projects
      summary: Delete a project
      description: Deletes a project by ID. All associated tasks will also be removed.
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            example: proj_003
          description: Unique identifier of the project.
      responses:
        '204':
          description: Project successfully deleted. No content returned.
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  
  /tasks:
    get: 
      tags:
        - Tasks
      summary: Get all tasks
      description: Retrieve a paginated list of all tasks assigned to the user. Supports filtering and sorting.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
          description: Page number (default is 1)
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
          description: Number of tasks per page (default is 20)
        - name: status
          in: query
          schema: 
            type: string
            enum: [pending, in_progress, completed]
            example: "in_progress"
          description: Filter tasks by status
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, dueDate, title]
            example: "createdAt"
          description: Sort tasks by a field
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            example: "desc"
          description: Sort direction (ascending or descending)
      responses: 
        '200':
          description: A list of all tasks successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: 
                      $ref: '#/components/schemas/Task'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                data: 
                  - taskId: "task_001"
                    title: "Design homepage"
                    description: "Create layout wireframes for the homepage"
                    status: "in_progress"
                    assignee:
                      userId: "user_001"
                      username: "winter"
                      fullName: "Winter Doe"
                      email: "winter.doe@example.com"
                    projectId: "proj_001"
                    createdAt: "2025-04-01T10:00:00Z"
                    dueDate: "2025-04-10"
                meta:
                  totalItems: 48
                  page: 1
                  limit: 10
                  totalPages: 5

    post: 
      tags:
        - Tasks
      summary: Create a new task
      description: Submit task details to create a new task under a specific project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: string
                  description: The ID of the project to associate the task with.
                title:
                  type: string
                  description: The title or name of the task.
                description:
                  type: string
                  description: Detailed information or instructions about the task.
                assignee:
                  $ref: '#/components/schemas/User'
                dueDate:
                  type: string
                  format: date
                  description: The due date for the task in YYYY-MM-DD format.
              required:
                - projectId
                - title
            example:
              projectId: "proj_001"
              title: "Create landing page"
              description: "Landing page for new product launch."
              assignee:
                userId: "user_003"
                username: "summer"
                fullName: "Summer Mi"
                email: "summer.mi@example.com"
              dueDate: "2025-04-15"
      responses:
        '201':
          description: Task successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
              example:
                data:
                  taskId: "task_045"
                  projectId: "proj_001"
                  title: "Create landing page"
                  description: "Landing page for new product launch."
                  status: "pending"
                  assignee:
                    userId: "user_003"
                    username: "summer"
                    fullName: "Summer Mi"
                    email: "summer.mi@example.com"
                  dueDate: "2025-04-15"
                  createdAt: "2025-04-08T11:12:00Z"
        '400':
          $ref: '#/components/responses/ValidationError'
  
  /tasks/{taskId}:
    get:
      tags:
        - Tasks
      summary: Get a task by task ID
      description: Retrieve a single task by its ID.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            example: "task_001"
          description: Unique identifier of the task.
      responses:
        '200':
          description: Task successfully retrieved.
          content: 
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
                example:
                  data:
                    taskId: "task_001"
                    title: "Design homepage"
                    description: "Create layout wireframes for the homepage"
                    status: "in_progress"
                    assignee:
                      userId: "user_001"
                      username: "winter"
                      fullName: "Winter Doe"
                      email: "winter.doe@example.com"
                    projectId: "proj_001"
                    createdAt: "2025-04-01T10:00:00Z"
                    dueDate: "2025-04-10"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags:
        - Tasks 
      summary: Update an entire task
      description: Replaces all attributes of a task with new values.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            example: "task_045"
          description: Unique identifier of the task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
            example:
              taskId: "task_045"
              title: "Revise landing page copy"
              description: "Update text and hero section of the landing page."
              status: "in_progress"
              assignee:
                userId: "user_002"
                username: "spring"
                fullName: "Spring Lee"
                email: "spring.lee@example.com"
              projectId: "proj_001"
              createdAt: "2025-04-08T11:12:00Z"
      responses:
        '200':
          description: Task successfully updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
              example:
                data:
                  taskId: "task_045"
                  title: "Revise landing page copy"
                  description: "Update text and hero section of the landing page"
                  status: "in_progress"
                  assignee:
                    userId: "user_002"
                    username: "spring"
                    fullName: "Spring Lee"
                    email: "spring.lee@example.com"
                  dueDate: "2025-04-16"
                  createdAt: "2025-04-08T11:12:00Z"
                  updatedAt: "2025-04-09T13:40:00Z"

    patch:
      tags:
        - Tasks 
      summary: Partially update a task
      description: Updates one or more attributes of a task (e.g. status or assignee).
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            example: task_045
          description: Unique identifier of the task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                status:
                  type: string
                  enum: [pending, in_progress, completed]
                dueDate:
                  type: string
                  format: date
            example:
              title: "Refactor landing page layout"
              status: "in_progress"
              dueDate: "2025-04-20"
      responses:
        '200':
          description: Task successfully patched.
          content: 
            application/json:
              schema:
                type: object
                properties: 
                  data:
                    $ref: '#/components/schemas/Task'
              example:
                data:
                  taskId: "task_045"
                  title: "Refactor landing page layout"
                  description: "Update text and hero section of the landing page."
                  status: "in_progress"
                  assignee:
                    userId: "user_002"
                    username: "spring"
                    fullName: "Spring Lee"
                    email: "spring.lee@example.com"
                  projectId: "proj_001"
                  dueDate: "2025-04-20"
                  createdAt: "2025-04-08T11:12:00Z"
                  updatedAt: "2025-04-09T15:45:00Z"
    
    delete:
      tags:
        - Tasks 
      summary: Delete a task
      description: Permanently removes a task by its ID.
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            example: task_045
          description: Unique identifier of the task
      responses:
        '204':
          description: Task successfully deleted. No content returned.
          content: {}
        '404':
          $ref: '#/components/responses/NotFoundError'


  /projects/{projectId}/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks for a project
      description: Retrieve all tasks belonging to the specified project.
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200': 
          description: A list of tasks retrieved for the specified project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                data:
                  - taskId: "task_001"
                    title: "Design homepage"
                    description: "Create layout wireframes for the homepage"
                    status: "in_progress"
                    assignee:
                      userId: "user_001"
                      username: "winter"
                    projectId: "proj_001"
                    createdAt: "2025-04-01T10:00:00Z"
                    dueDate: "2025-04-10"
                meta:
                  totalItems: 2
                  page: 1
                  limit: 10
                  totalPages: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    
  /tasks/{taskId}/status:
    patch:
      tags:
        - Tasks
      summary: Update task status
      description: Change the status of a task to reflect its progress.
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            example: task_045
          description: Unique identifier of the task.
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, completed]
                  description: The new status to assign to the task.
              required: 
                - status
            example: 
              status: "completed"
      responses:
        '200':
          description: Task status successfully updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
              example:
                data:
                  taskId: "task_045"
                  title: "Revise landing page copy"
                  description: "Update text and hero section of the landing page"
                  status: "completed"
                  assignee:
                    userId: "user_002"
                    username: "spring"
                    fullName: "Spring Lee"
                    email: "spring.lee@example.com"
                  dueDate: "2025-04-16"
                  createdAt: "2025-04-08T11:12:00Z"
                  updatedAt: "2025-04-09T14:30:00Z"
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /comments:
    post:
      tags:
        - Comments
      summary: Add a comment to a task
      description: |
        Submit a comment to a specific task. Supports @mention syntax (e.g., `@username`) to notify users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
            example:
              commentId: "cmt_001"
              taskId: "task_001"
              author:
                userId: "user_001"
                username: "winter"
                fullName: "Winter Doe"
                email: "winter.doe@example.com"
              content: "@john Please check the latest update on the dashboard."
              createdAt: "2025-04-02T09:20:00Z"
      responses:
        '200': 
          description: Comment successfully added to the task.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Comment'
              example:
                data:
                  commentId: "cmt_001"
                  taskId: "task_001"
                  author:
                    userId: "user_001"
                    username: "winter"
                    fullName: "Winter Lee"
                    email: "winter.lee@example.com"
                  content: "@john Please check the latest update on the dashboard."
                  createdAt: "2025-04-02T10:30:00Z"
        '400':
          $ref: '#/components/responses/ValidationError'
  
  /tasks/{taskId}/comments:
    get:
      tags:
        - Comments
      summary: Get comments for a task
      description: Retrieve all comments associated with a specific task.
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
          description: The ID of the task to retrieve comments for.
        - in: query
          name: preview
          required: false
          schema:
            type: boolean
