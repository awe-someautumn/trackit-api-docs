  /history:
    get:
      tags:
        - History
      summary: Get all task status change history
      description: |
        Retrieve a list of status change events across tasks to the authenticated user.
      security:
        - oAuth2ClientCredentials:
            - read
      parameters:
        - in: query
          name: userId
          schema:
            type: string
          description: Filter history by user ID (optional)
        - in: query
          name: projectId
          schema:
            type: string
          description: Filter history by project ID (optional)
      responses:
        '200':
          description: A list of all task status change records successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/History'
              example:
                data:
                  - taskId: "task_001"
                    userId: "user_003"
                    projectId: "proj_001"
                    changedAt: "2025-04-02T14:00:00Z"
                    oldStatus: "in_progress"
                    newStatus: "completed"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /tasks/{taskId}/history:
    get:
      tags:
        - History
      summary: Get task status change history
      description: Retrieve the history of status changes for a specific task.
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
          description: Unique identifier of the task.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Page number of the result set.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
          description: Number of history items per page.
